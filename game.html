<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo de Adivinhação</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #e8ff45;
      --accent2: #ff4578;
      --text: #f0f0f5;
      --muted: #5a5a72;
      --success: #45ffb0;
      --danger: #ff4545;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,69,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,69,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridDrift {
      0%   { transform: translateY(0); }
      100% { transform: translateY(48px); }
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: blobPulse 8s ease-in-out infinite alternate;
    }
    .blob-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -60px; animation-delay: 3s; }

    @keyframes blobPulse {
      0%   { transform: scale(1); opacity: 0.18; }
      100% { transform: scale(1.2); opacity: 0.26; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 48px 44px 44px;
      width: min(92vw, 480px);
      box-shadow: 0 0 80px rgba(232,255,69,0.05), 0 24px 60px rgba(0,0,0,0.6);
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 10px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    h1 span { color: var(--accent); }

    .description {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
      border-left: 2px solid var(--border);
      padding-left: 14px;
    }

    /* Attempt bar */
    .attempts-bar {
      display: flex;
      gap: 5px;
      margin-bottom: 28px;
    }

    .attempt-pip {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    .attempt-pip.used  { background: var(--accent2); }
    .attempt-pip.active { background: var(--accent); }

    .attempts-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Range display */
    .range-display {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .range-display span { color: var(--accent); font-weight: 700; }

    /* Input row */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="number"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      padding: 14px 18px;
      outline: none;
      border-radius: 2px;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus { border-color: var(--accent); }
    input[type="number"]:disabled { opacity: 0.4; cursor: not-allowed; }

    button#btn-chutar {
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 22px;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button#btn-chutar:hover:not(:disabled) { background: #d4eb30; transform: translateY(-1px); }
    button#btn-chutar:active:not(:disabled) { transform: translateY(0); }
    button#btn-chutar:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Message */
    #mensagem {
      min-height: 52px;
      font-size: 14px;
      line-height: 1.5;
      padding: 14px 16px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      transition: all 0.3s ease;
      margin-bottom: 12px;
    }

    #mensagem.acerto   { border-color: var(--success); color: var(--success); }
    #mensagem.erro     { border-color: var(--danger);  color: var(--danger);  }
    #mensagem.dica     { border-color: var(--accent);  color: var(--accent);  }
    #mensagem.shake    { animation: shake 0.35s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(6px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }

    /* Restart */
    #btn-restart {
      display: none;
      width: 100%;
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }

    #btn-restart:hover { border-color: var(--text); color: var(--text); }

    /* History */
    .history-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 22px;
      margin-bottom: 8px;
    }

    #historico {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .hist-item {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 2px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
    }

    .hist-item.alto  { background: rgba(255,69,120,0.15); color: var(--accent2); }
    .hist-item.baixo { background: rgba(232,255,69,0.12); color: var(--accent); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="tag">Mini Game</div>
    <h1>Adivinhe o<br><span>Número</span></h1>
    <p class="description">
      Um número entre <strong>1</strong> e <strong>100</strong> foi gerado.<br>
      Você tem <strong>10 tentativas</strong> para descobrir qual é.
    </p>

    <div class="attempts-label">Tentativas restantes</div>
    <div class="attempts-bar" id="pips"></div>

    <div class="range-display">
      <span>Mínimo: <span id="min-val">1</span></span>
      <span>Máximo: <span id="max-val">100</span></span>
    </div>

    <div class="input-row">
      <input type="number" id="palpite" min="1" max="100" placeholder="??" autofocus />
      <button id="btn-chutar">Chutar</button>
    </div>

    <p id="mensagem">Digite um número e clique em Chutar.</p>
    <button id="btn-restart">↺ Jogar Novamente</button>

    <div class="history-label" id="history-label" style="display:none">Tentativas anteriores</div>
    <div id="historico"></div>
  </div>

  <script>
    const MAX_TENTATIVAS = 10;
    let numeroSecreto, tentativas, jogoAtivo, minHint, maxHint;

    const inputEl    = document.getElementById('palpite');
    const btnChutar  = document.getElementById('btn-chutar');
    const msgEl      = document.getElementById('mensagem');
    const pipsEl     = document.getElementById('pips');
    const historicoEl= document.getElementById('historico');
    const btnRestart = document.getElementById('btn-restart');
    const minValEl   = document.getElementById('min-val');
    const maxValEl   = document.getElementById('max-val');
    const histLabel  = document.getElementById('history-label');

    function iniciarJogo() {
      numeroSecreto = Math.floor(Math.random() * 100) + 1;
      tentativas    = 0;
      jogoAtivo     = true;
      minHint       = 1;
      maxHint       = 100;

      inputEl.value    = '';
      inputEl.disabled = false;
      btnChutar.disabled = false;
      btnRestart.style.display = 'none';
      historicoEl.innerHTML = '';
      histLabel.style.display = 'none';
      minValEl.textContent = '1';
      maxValEl.textContent = '100';

      setMsg('Digite um número e clique em Chutar.', '');
      renderPips();
      inputEl.focus();
    }

    function renderPips() {
      pipsEl.innerHTML = '';
      for (let i = 0; i < MAX_TENTATIVAS; i++) {
        const pip = document.createElement('div');
        pip.className = 'attempt-pip';
        if (i < tentativas)         pip.classList.add('used');
        else if (i === tentativas)  pip.classList.add('active');
        pipsEl.appendChild(pip);
      }
    }

    function setMsg(texto, classe) {
      msgEl.className = '';
      msgEl.textContent = texto;
      if (classe) {
        void msgEl.offsetWidth; // reflow for animation replay
        msgEl.classList.add(classe);
      }
    }

    function addHistorico(numero, tipo) {
      histLabel.style.display = 'block';
      const chip = document.createElement('span');
      chip.className = `hist-item ${tipo}`;
      chip.textContent = numero;
      historicoEl.appendChild(chip);
    }

    function chutar() {
      if (!jogoAtivo) return;

      const palpite = parseInt(inputEl.value, 10);

      if (isNaN(palpite) || palpite < 1 || palpite > 100) {
        setMsg('⚠ Digite um número válido entre 1 e 100.', 'erro shake');
        return;
      }

      tentativas++;
      renderPips();

      if (palpite === numeroSecreto) {
        setMsg(`🎉 Você acertou! Era ${numeroSecreto}. (${tentativas} tentativa${tentativas > 1 ? 's' : ''})`, 'acerto');
        encerrarJogo();
        return;
      }

      if (tentativas >= MAX_TENTATIVAS) {
        addHistorico(palpite, palpite > numeroSecreto ? 'alto' : 'baixo');
        setMsg(`💀 Você perdeu! O número secreto era ${numeroSecreto}.`, 'erro');
        encerrarJogo();
        return;
      }

      if (palpite < numeroSecreto) {
        minHint = Math.max(minHint, palpite + 1);
        minValEl.textContent = minHint;
        addHistorico(palpite, 'baixo');
        setMsg(`⬆ O número secreto é MAIOR que ${palpite}.`, 'dica');
      } else {
        maxHint = Math.min(maxHint, palpite - 1);
        maxValEl.textContent = maxHint;
        addHistorico(palpite, 'alto');
        setMsg(`⬇ O número secreto é MENOR que ${palpite}.`, 'dica');
      }

      inputEl.value = '';
      inputEl.focus();
    }

    function encerrarJogo() {
      jogoAtivo = false;
      inputEl.disabled = true;
      btnChutar.disabled = true;
      btnRestart.style.display = 'block';
      renderPips();
    }

    btnChutar.addEventListener('click', chutar);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') chutar(); });
    btnRestart.addEventListener('click', iniciarJogo);

    iniciarJogo();
  </script>
</body>
</html>
